name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
# The unit suite is the policy engine, which is pure and needs no model key, so
# CI runs without any secrets. The smoke, stress, and eval scripts need a key
# and are run on demand, not in CI.
